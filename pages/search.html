---
title: Search
sitemap: false
permalink: /search/
not_editable: true
excluded_in_search: true
description: 시리즈 엔트리/포스트 통합 검색
---

<div class="section-heading">
  <p class="section-heading__kicker">Search</p>
  <h2 class="section-heading__title">사이트 통합 검색</h2>
  <p class="section-heading__description">시리즈 엔트리, 포스트, 정적 페이지를 한 번에 검색합니다.</p>
</div>

<section class="search-panel">
  <input class="search-input td-search-input js-search-input" type="search" name="q" id="search-input" placeholder="검색어를 입력하세요">
  <p class="search-status"><span id="search-process">Loading</span> results <span id="search-query-container" class="search-query-container">for "<strong id="search-query"></strong>"</span></p>
  <ul id="search-results" class="search-results"></ul>
</section>

<script>
	window.data = {
		{% for post in site.docs %}
				{% unless post.excluded_in_search %}
					{% if added %},{% endif %}
					{% assign added = false %}
					{% assign search_url = post.url %}
					{% assign search_url_leaf = search_url | split: "/" | last %}
					{% if search_url != "/" and search_url_leaf == "index" %}
						{% assign search_url = search_url | replace: "/index", "/" %}
					{% endif %}
					{% assign search_id = search_url | slugify %}
					{% if search_id == "" %}
						{% assign search_id = "home" %}
					{% endif %}
					"{{ search_id }}": {
						"id": "{{ search_id }}",
						"title": "{{ post.title | xml_escape }}",
						"categories": "{{ post.categories | join: ", " | xml_escape }}",
						"url": "{{ search_url | xml_escape }}",
						"content": {{ post.content | strip_html | replace_regex: "[\s/\n]+"," " | strip | jsonify }}
					}
					{% assign added = true %}
				{% endunless %}
		{% endfor %}
		{% for post in site.posts %}
				{% unless post.excluded_in_search %}
					{% if added %},{% endif %}
					{% assign added = false %}
					{% assign search_url = post.url %}
					{% assign search_url_leaf = search_url | split: "/" | last %}
					{% if search_url != "/" and search_url_leaf == "index" %}
						{% assign search_url = search_url | replace: "/index", "/" %}
					{% endif %}
					{% assign search_id = search_url | slugify %}
					{% if search_id == "" %}
						{% assign search_id = "home" %}
					{% endif %}
					"{{ search_id }}": {
						"id": "{{ search_id }}",
						"title": "{{ post.title | xml_escape }}",
						"categories": "{{ post.categories | join: ", " | xml_escape }}",
						"url": "{{ search_url | xml_escape }}",
						"content": {{ post.content | strip_html | replace_regex: "[\s/\n]+"," " | strip | jsonify }}
					}
					{% assign added = true %}
				{% endunless %}
		{% endfor %}
		{% for post in site.pages %}
				{% unless post.excluded_in_search %}
					{% if added %},{% endif %}
					{% assign added = false %}
					{% assign search_url = post.url %}
					{% assign search_url_leaf = search_url | split: "/" | last %}
					{% if search_url != "/" and search_url_leaf == "index" %}
						{% assign search_url = search_url | replace: "/index", "/" %}
					{% endif %}
					{% assign search_id = search_url | slugify %}
					{% if search_id == "" %}
						{% assign search_id = "home" %}
					{% endif %}
					"{{ search_id }}": {
						"id": "{{ search_id }}",
						"title": "{{ post.title | xml_escape }}",
						"categories": "{{ post.categories | join: ", " | xml_escape }}",
						"url": "{{ search_url | xml_escape }}",
						"content": {{ post.content | strip_html | replace_regex: "[\s/\n]+"," " | strip | jsonify }}
					}
					{% assign added = true %}
				{% endunless %}
		{% endfor %}
	};
</script>
<script defer src="{{ site.baseurl }}/assets/js/lunr.min.js"></script>
<script defer src="{{ site.baseurl }}/assets/js/search.js"></script>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="generator" content="Jekyll">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="{{ site.color | default: '#0f5bd8' }}">

{% assign page_title = page.title | default: site.title %}
{% assign page_description = page.description | default: site.description %}
<title>{{ page_title }}</title>
<meta name="description" content="{{ page_description | strip_html | strip_newlines | truncate: 160 }}">

<link rel="shortcut icon" href="{{ site.baseurl }}/assets/favicons/favicon.ico">
<link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/favicons/apple-touch-icon.png" sizes="180x180">
<link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicons/favicon-16x16.png" sizes="16x16">
<link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/favicons/favicon-32x32.png" sizes="32x32">
<link rel="manifest" href="{{ site.baseurl }}/assets/favicons/site.webmanifest">

<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_description | strip_html | strip_newlines | truncate: 160 }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta property="og:site_name" content="{{ site.title }}">
{% if page.image %}<meta property="og:image" content="{{ page.image }}">{% endif %}

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page_title }}">
<meta name="twitter:description" content="{{ page_description | strip_html | strip_newlines | truncate: 160 }}">
{% if page.image %}<meta name="twitter:image" content="{{ page.image }}">{% endif %}

<link rel="canonical" href="{{ site.url }}{{ page.url }}">
<link rel="alternate" type="application/rss+xml" href="{{ site.baseurl }}/feed.xml">

<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/tokens.css">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/palette.css">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/site.css">
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/home.css">

<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-5BTZG6C');</script>
<!-- End Google Tag Manager -->
</head>

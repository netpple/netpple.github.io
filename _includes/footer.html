<footer class="site-footer">
  <div class="site-container site-footer__inner">
    <div class="site-footer__top">
      <div>
        <p class="site-footer__title">{{ site.title }} · 기술 블로그</p>
        <p class="site-footer__description">클라우드 네이티브, 분산 시스템, 보안 운영 경험을 기록합니다.</p>
      </div>
      <div class="site-footer__links">
        <a class="site-footer__link" href="{{ site.baseurl }}/news/">Posts</a>
        <a class="site-footer__link" href="{{ site.baseurl }}/docs/">Series</a>
        <a class="site-footer__link" href="{{ site.baseurl }}/about/">About</a>
        <a class="site-footer__link" href="https://github.com/netpple/netpple.github.io" target="_blank" rel="noreferrer noopener">GitHub</a>
        {% if site.linkedin %}<a class="site-footer__link" href="https://linkedin.com/in/{{ site.linkedin }}" target="_blank" rel="noreferrer noopener">LinkedIn</a>{% endif %}
      </div>
    </div>

    <div class="site-footer__bottom">
      <span>© {{ "now" | date: "%Y" }} {{ site.author }}. All rights reserved.</span>
      <span>Since 2021 · GitHub Pages + Jekyll</span>
      {% if site.visitor_counter_badge %}
      <span class="site-footer__counter">
        <img
          class="site-footer__counter-badge"
          src="{{ site.visitor_counter_badge }}"
          alt="Visits counter badge"
          loading="lazy"
          decoding="async"
          referrerpolicy="no-referrer">
      </span>
      {% endif %}
    </div>
  </div>
</footer>
